<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polygon Winding Direction</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0e1a;
            --panel: #151827;
            --border: #252a3a;
            --text: #c8cdd8;
            --dim: #5a6178;
            --ccw: #10b981;
            --cw: #f43f5e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { font-size: 26px; margin-bottom: 8px; color: #e2e8f0; }
        .subtitle { color: var(--dim); margin-bottom: 25px; font-size: 14px; text-align: center; }
        .panels { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .panel-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .panel-sub {
            font-size: 12px;
            color: var(--dim);
            margin-bottom: 12px;
            font-family: 'JetBrains Mono', monospace;
        }
        canvas {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .controls { margin-top: 20px; }
        button {
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            background: #38bdf8;
            color: var(--bg);
        }
    </style>
</head>
<body>

    <h1>Polygon Winding Direction (lm__signed_area)</h1>
    <p class="subtitle">
        The sign of the area tells you which way the vertices go around the polygon.<br>
        Watch the arrows trace the vertex order.
    </p>

    <div class="panels">
        <div class="panel">
            <div class="panel-title" style="color: var(--ccw);">Counter-Clockwise (CCW)</div>
            <div class="panel-sub">lm__signed_area → <span style="color: var(--ccw);">POSITIVE</span></div>
            <canvas id="ccwCanvas" width="300" height="300"></canvas>
        </div>
        <div class="panel">
            <div class="panel-title" style="color: var(--cw);">Clockwise (CW)</div>
            <div class="panel-sub">lm__signed_area → <span style="color: var(--cw);">NEGATIVE</span></div>
            <canvas id="cwCanvas" width="300" height="300"></canvas>
        </div>
    </div>

    <div class="controls">
        <button id="replayBtn">Replay Animation</button>
    </div>

    <script>
        // CCW vertices (left-turn around the polygon)
        const ccwPoints = [
            { x: 150, y: 260 },  // Bottom center
            { x: 260, y: 180 },  // Right
            { x: 220, y: 60 },   // Top right
            { x: 80, y: 60 },    // Top left
            { x: 40, y: 180 },   // Left
        ];

        // CW vertices (same shape, reversed order = right-turn)
        const cwPoints = [...ccwPoints].reverse();

        let timeouts = [];

        function clearAll() {
            timeouts.forEach(t => clearTimeout(t));
            timeouts = [];
        }

        function drawPolygonBase(ctx, points, color) {
            ctx.clearRect(0, 0, 300, 300);

            // Fill
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.closePath();
            ctx.fillStyle = color.replace(')', ', 0.1)').replace('rgb', 'rgba');
            ctx.fill();

            // Outline
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.closePath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Vertex dots with labels
            ctx.font = '13px JetBrains Mono';
            points.forEach((p, i) => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.fillStyle = '#e2e8f0';
                ctx.fillText(`${i + 1}`, p.x + 10, p.y - 10);
            });
        }

        function drawArrow(ctx, from, to, color, progress) {
            const dx = to.x - from.x;
            const dy = to.y - from.y;

            const endX = from.x + dx * progress;
            const endY = from.y + dy * progress;

            // Line
            ctx.beginPath();
            ctx.moveTo(from.x, from.y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.stroke();

            // Arrowhead (only when progress > 0.3)
            if (progress > 0.3) {
                const headLen = 12;
                const angle = Math.atan2(dy, dx);
                ctx.beginPath();
                ctx.moveTo(endX, endY);
                ctx.lineTo(
                    endX - headLen * Math.cos(angle - Math.PI / 6),
                    endY - headLen * Math.sin(angle - Math.PI / 6)
                );
                ctx.moveTo(endX, endY);
                ctx.lineTo(
                    endX - headLen * Math.cos(angle + Math.PI / 6),
                    endY - headLen * Math.sin(angle + Math.PI / 6)
                );
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        }

        function animateArrows(canvasId, points, color) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');

            const edges = [];
            for (let i = 0; i < points.length; i++) {
                const next = (i + 1) % points.length;
                edges.push({ from: points[i], to: points[next] });
            }

            let edgeIdx = 0;
            let progress = 0;

            function frame() {
                drawPolygonBase(ctx, points, color);

                // Draw completed arrows
                for (let i = 0; i < edgeIdx; i++) {
                    drawArrow(ctx, edges[i].from, edges[i].to, color, 1.0);
                }

                // Draw current arrow
                if (edgeIdx < edges.length) {
                    drawArrow(ctx, edges[edgeIdx].from, edges[edgeIdx].to, color, progress);

                    progress += 0.04;
                    if (progress >= 1.0) {
                        progress = 0;
                        edgeIdx++;
                    }

                    timeouts.push(setTimeout(frame, 30));
                } else {
                    // Done — draw direction label in center
                    ctx.font = 'bold 20px DM Sans';
                    ctx.fillStyle = color;
                    ctx.textAlign = 'center';
                    if (color === '#10b981') {
                        ctx.fillText('↺ CCW', 150, 170);
                        ctx.font = '14px JetBrains Mono';
                        ctx.fillText('area = +1.5', 150, 195);
                    } else {
                        ctx.fillText('↻ CW', 150, 170);
                        ctx.font = '14px JetBrains Mono';
                        ctx.fillText('area = -1.5', 150, 195);
                    }
                    ctx.textAlign = 'start';
                }
            }

            frame();
        }

        function runAnimation() {
            clearAll();
            animateArrows('ccwCanvas', ccwPoints, '#10b981');
            animateArrows('cwCanvas', cwPoints, '#f43f5e');
        }

        document.getElementById('replayBtn').addEventListener('click', runAnimation);
        runAnimation();
    </script>
</body>
</html>

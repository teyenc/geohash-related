<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R-Tree Spatial Index — How It Works</title>
<style>
  :root {
    --bg: #0a0e17; --surface: #131a2b; --border: #1e2a42; --text: #c8d6e5;
    --accent: #4ecdc4; --accent2: #ff6b6b; --accent3: #ffd93d; --accent4: #6c5ce7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #667; margin-bottom: 20px; }
  .layout { display: flex; gap: 20px; }
  .map-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; flex: 1; }
  canvas { display: block; }
  .side { width: 320px; display: flex; flex-direction: column; gap: 14px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .panel h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #556; margin-bottom: 10px; }
  .step { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); opacity: 0.35; transition: opacity 0.3s; font-size: 13px; line-height: 1.4; }
  .step.active { opacity: 1; }
  .step:last-child { border-bottom: none; }
  .step-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .controls { display: flex; gap: 8px; margin-top: 10px; }
  button { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; }
  button:hover { background: var(--border); color: #fff; }
  button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 2px solid; }
  .tree-view { font-family: monospace; font-size: 12px; line-height: 1.8; }
  .tree-node.pruned { opacity: 0.25; text-decoration: line-through; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { text-align: center; padding: 8px; background: rgba(255,255,255,0.02); border-radius: 8px; }
  .stat-val { font-size: 22px; font-weight: 700; font-family: monospace; }
  .stat-label { font-size: 11px; color: #556; margin-top: 2px; }
</style>
</head>
<body>
<div class="container">
  <h1>How an R-Tree Searches</h1>
  <p class="subtitle">Click "Next Step" to watch the R-Tree prune branches and find matching geometries</p>
  <div class="layout">
    <div class="map-box"><canvas id="c" width="700" height="540"></canvas></div>
    <div class="side">
      <div class="panel">
        <h3>Legend</h3>
        <div class="legend">
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(255,217,61,0.15);border-color:rgba(255,217,61,0.5)"></div>Root</div>
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(78,205,196,0.2);border-color:rgba(78,205,196,0.7)"></div>R5 (West)</div>
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(255,107,107,0.2);border-color:rgba(255,107,107,0.7)"></div>R6 (East)</div>
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(108,92,231,0.25);border-color:rgba(108,92,231,0.9)"></div>Query Box</div>
        </div>
      </div>
      <div class="panel">
        <h3>Search Steps</h3>
        <div id="steps"></div>
        <div class="controls">
          <button onclick="prev()">Back</button>
          <button class="primary" onclick="next()">Next Step</button>
        </div>
      </div>
      <div class="panel">
        <h3>Tree Structure</h3>
        <div id="tree" class="tree-view"></div>
      </div>
      <div class="panel">
        <h3>Performance</h3>
        <div class="stats">
          <div class="stat"><div class="stat-val" id="chk" style="color:var(--accent)">0</div><div class="stat-label">Boxes Checked</div></div>
          <div class="stat"><div class="stat-val" id="prn" style="color:var(--accent2)">0</div><div class="stat-label">Branches Pruned</div></div>
          <div class="stat"><div class="stat-val" id="cnd" style="color:var(--accent3)">0</div><div class="stat-label">Candidates</div></div>
          <div class="stat"><div class="stat-val" id="dsk" style="color:var(--accent4)">0</div><div class="stat-label">Disk Reads</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d'),W=700,H=540;
const B={R1:{x:140,y:185,w:24,h:24},R2:{x:90,y:268,w:170,h:38},R3:{x:410,y:138,w:140,h:122},R4:{x:448,y:290,w:162,h:140},R5:{x:78,y:175,w:195,h:145},R6:{x:398,y:128,w:225,h:315},Root:{x:58,y:108,w:585,h:355}};
const Q={x:380,y:195,w:205,h:185};
const steps=[
  {t:'Data on the map',d:'We have <strong>4 geometries</strong>: a House (point), a Street (line), and two Parks (polygons). The R-Tree wraps each in a <strong>Minimum Bounding Rectangle</strong> (MBR).',hl:[],c:0,p:0,n:0,dk:0},
  {t:'Query arrives',d:'A query asks: <strong>"Find everything that intersects the purple box."</strong> The R-Tree starts searching from the Root.',hl:['q'],c:0,p:0,n:0,dk:0},
  {t:'Check Root box',d:'Does the Query overlap the <strong style="color:#ffd93d">Root</strong> box? <strong style="color:#4ecdc4">YES.</strong> Go deeper into its children.',hl:['q','root'],c:1,p:0,n:0,dk:0},
  {t:'Check R5 (West side)',d:'Does the Query overlap <strong style="color:#4ecdc4">R5</strong>? <strong style="color:#ff6b6b">NO!</strong> The R-Tree instantly <strong>prunes the entire West branch</strong>. House and Street are never touched.',hl:['q','r5x'],c:2,p:1,n:0,dk:0},
  {t:'Check R6 (East side)',d:'Does the Query overlap <strong style="color:#ff6b6b">R6</strong>? <strong style="color:#4ecdc4">YES.</strong> Go deeper into R6\'s children.',hl:['q','r6'],c:3,p:1,n:0,dk:0},
  {t:'Check R3 (Park A)',d:'Does the Query overlap <strong>R3</strong>\'s MBR? <strong style="color:#4ecdc4">YES.</strong> Park A is a <strong>candidate</strong> — fetch it from disk for exact check.',hl:['q','r6','r3h'],c:4,p:1,n:1,dk:1},
  {t:'Check R4 (Park B)',d:'Does the Query overlap <strong>R4</strong>\'s MBR? <strong style="color:#4ecdc4">YES.</strong> Park B is also a <strong>candidate</strong>.',hl:['q','r6','r3h','r4h'],c:5,p:1,n:2,dk:2},
  {t:'Search complete!',d:'The R-Tree checked <strong>5 bounding boxes</strong>, pruned <strong>1 entire branch</strong> (skipping 2 objects), and read only <strong>2 rows from disk</strong> instead of scanning all 4. This is how PostGIS achieves sub-millisecond spatial queries on millions of rows.',hl:['q','r3h','r4h','r5dead'],c:5,p:1,n:2,dk:2}
];
let S=0;

function rr(b,f,s,lw=2,dash=false){cx.save();if(dash)cx.setLineDash([6,4]);cx.fillStyle=f;cx.strokeStyle=s;cx.lineWidth=lw;cx.beginPath();cx.roundRect(b.x,b.y,b.w,b.h,4);cx.fill();cx.stroke();cx.restore();}
function lb(t,x,y,c,sz=11){cx.save();cx.font=`bold ${sz}px monospace`;cx.fillStyle=c;cx.fillText(t,x,y);cx.restore();}

function draw(){
  cx.clearRect(0,0,W,H);
  // grid
  cx.strokeStyle='#1a2035';cx.lineWidth=1;
  for(let x=0;x<W;x+=40){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
  for(let y=0;y<H;y+=40){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}

  const h=steps[S].hl, pruned=h.includes('r5x')||h.includes('r5dead');

  // Root
  cx.save();cx.globalAlpha=h.includes('root')?1:0.3;
  rr(B.Root,'rgba(255,217,61,0.05)','rgba(255,217,61,0.25)',1,true);
  lb('Root',B.Root.x+4,B.Root.y-5,'rgba(255,217,61,0.4)');
  cx.restore();

  // R5
  cx.save();cx.globalAlpha=pruned?0.12:0.5;
  rr(B.R5,'rgba(78,205,196,0.08)','rgba(78,205,196,0.45)',2);
  lb('R5 (West)',B.R5.x+4,B.R5.y-5,'rgba(78,205,196,0.6)');
  cx.restore();

  // R6
  cx.save();cx.globalAlpha=(h.includes('r6')||h.includes('r3h')||h.includes('r4h'))?1:0.5;
  rr(B.R6,'rgba(255,107,107,0.06)','rgba(255,107,107,0.45)',2);
  lb('R6 (East)',B.R6.x+4,B.R6.y-5,'rgba(255,107,107,0.6)');
  cx.restore();

  // Leaf MBRs
  cx.save();cx.globalAlpha=pruned?0.08:0.35;
  rr(B.R1,'transparent','rgba(78,205,196,0.35)',1,true);
  rr(B.R2,'transparent','rgba(78,205,196,0.35)',1,true);
  cx.restore();
  cx.save();cx.globalAlpha=h.includes('r3h')?1:0.35;
  rr(B.R3,h.includes('r3h')?'rgba(78,205,196,0.12)':'transparent',h.includes('r3h')?'#4ecdc4':'rgba(255,107,107,0.35)',h.includes('r3h')?3:1,!h.includes('r3h'));
  cx.restore();
  cx.save();cx.globalAlpha=h.includes('r4h')?1:0.35;
  rr(B.R4,h.includes('r4h')?'rgba(78,205,196,0.12)':'transparent',h.includes('r4h')?'#4ecdc4':'rgba(255,107,107,0.35)',h.includes('r4h')?3:1,!h.includes('r4h'));
  cx.restore();

  // Shapes
  cx.save();cx.globalAlpha=pruned?0.08:0.8;
  // House (point)
  cx.fillStyle='#4ecdc4';cx.beginPath();cx.arc(152,197,6,0,Math.PI*2);cx.fill();
  lb('House',162,201,'#4ecdc4');
  // Street (line)
  cx.strokeStyle='#4ecdc4';cx.lineWidth=3;cx.beginPath();cx.moveTo(100,280);cx.lineTo(250,298);cx.stroke();
  lb('Street',145,272,'#4ecdc4');
  cx.restore();

  // Park A
  cx.save();cx.fillStyle='#ff6b6b30';cx.strokeStyle='#ff6b6b';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(420,150);cx.lineTo(540,150);cx.lineTo(540,250);cx.lineTo(420,250);cx.closePath();cx.fill();cx.stroke();
  lb('Park A',458,205,'#fff',13);cx.restore();
  // Park B
  cx.save();cx.fillStyle='#ff6b6b30';cx.strokeStyle='#ff6b6b';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(460,300);cx.lineTo(600,300);cx.lineTo(600,420);cx.lineTo(460,420);cx.closePath();cx.fill();cx.stroke();
  lb('Park B',508,365,'#fff',13);cx.restore();

  // Query box
  if(h.includes('q')){
    rr(Q,'rgba(108,92,231,0.1)','rgba(108,92,231,0.85)',3);
    lb('Query',Q.x+Q.w/2-22,Q.y-8,'#6c5ce7',13);
  }

  // Pruned X
  if(pruned){
    cx.save();cx.strokeStyle='#ff6b6b';cx.lineWidth=4;cx.globalAlpha=0.6;
    const px=B.R5.x+B.R5.w/2,py=B.R5.y+B.R5.h/2;
    cx.beginPath();cx.moveTo(px-30,py-30);cx.lineTo(px+30,py+30);cx.stroke();
    cx.beginPath();cx.moveTo(px+30,py-30);cx.lineTo(px-30,py+30);cx.stroke();
    lb('PRUNED',px-28,py+48,'#ff6b6b',13);cx.restore();
  }

  // Hit glow
  if(h.includes('r3h')){cx.save();cx.strokeStyle='#4ecdc4';cx.lineWidth=2;cx.globalAlpha=0.5;cx.setLineDash([4,3]);
    cx.beginPath();cx.roundRect(B.R3.x-4,B.R3.y-4,B.R3.w+8,B.R3.h+8,6);cx.stroke();
    lb('MATCH',B.R3.x+B.R3.w+8,B.R3.y+B.R3.h/2+4,'#4ecdc4',11);cx.restore();}
  if(h.includes('r4h')){cx.save();cx.strokeStyle='#4ecdc4';cx.lineWidth=2;cx.globalAlpha=0.5;cx.setLineDash([4,3]);
    cx.beginPath();cx.roundRect(B.R4.x-4,B.R4.y-4,B.R4.w+8,B.R4.h+8,6);cx.stroke();
    lb('MATCH',B.R4.x+B.R4.w+8,B.R4.y+B.R4.h/2+4,'#4ecdc4',11);cx.restore();}

  // Update sidebar
  const s=steps[S];
  document.getElementById('chk').textContent=s.c;
  document.getElementById('prn').textContent=s.p;
  document.getElementById('cnd').textContent=s.n;
  document.getElementById('dsk').textContent=s.dk;
  updateSteps();updateTree();
}

function updateSteps(){
  const cols=['#556','#6c5ce7','#ffd93d','#ff6b6b','#ff6b6b','#4ecdc4','#4ecdc4','#4ecdc4'];
  document.getElementById('steps').innerHTML=steps.map((s,i)=>`
    <div class="step ${i<=S?'active':''}">
      <div class="step-num" style="background:${i<=S?cols[i]+'25':'#1a2035'};color:${i<=S?cols[i]:'#334'}">${i}</div>
      <div>${i===S?s.d:`<strong>${s.t}</strong>`}</div>
    </div>`).join('');
}

function updateTree(){
  const s=S;
  document.getElementById('tree').innerHTML=`
    <div style="color:#ffd93d${s<2?'55':''}">Root ${s>=2?'<span style="color:#4ecdc4">&#10003;</span>':''}</div>
    <div class="${s>=3?'tree-node pruned':''}" style="padding-left:18px;color:#4ecdc4${s>=3?'55':''}">├── R5 (West) ${s>=3?'<span style="color:#ff6b6b"> &#10007; pruned</span>':''}</div>
    <div class="${s>=3?'tree-node pruned':''}" style="padding-left:36px;color:#4ecdc455">├── R1 House ${s>=3?'(skipped)':''}</div>
    <div class="${s>=3?'tree-node pruned':''}" style="padding-left:36px;color:#4ecdc455">└── R2 Street ${s>=3?'(skipped)':''}</div>
    <div style="padding-left:18px;color:#ff6b6b${s<4?'55':''}">└── R6 (East) ${s>=4?'<span style="color:#4ecdc4"> &#10003; overlap</span>':''}</div>
    <div style="padding-left:36px;color:#ff6b6b${s<5?'55':''}">├── R3 Park A ${s>=5?'<span style="color:#4ecdc4"> &#10003; candidate</span>':''}</div>
    <div style="padding-left:36px;color:#ff6b6b${s<6?'55':''}">└── R4 Park B ${s>=6?'<span style="color:#4ecdc4"> &#10003; candidate</span>':''}</div>`;
}

function next(){if(S<steps.length-1){S++;draw();}}
function prev(){if(S>0){S--;draw();}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
draw();
</script>
</body>
</html>
